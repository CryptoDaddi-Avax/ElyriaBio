<!DOCTYPE html>
<html lang="en">
<head>

<meta name="robots" content="noindex, nofollow" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<body>

<div class="shell">
  <!-- ===================== SIDEBAR ===================== -->
  <aside class="side">
    <div class="side-brand">
      <span class="side-glyph" aria-hidden="true">
        <svg viewBox="0 0 30 30" fill="none"><defs><linearGradient id="elg" x1="4" y1="4" x2="26" y2="26" gradientUnits="userSpaceOnUse"><stop stop-color="#fdeec0"/><stop offset=".5" stop-color="#e7c06a"/><stop offset="1" stop-color="#a9792f"/></linearGradient></defs><path d="M6 5C16.5 9 13.5 21 24 25" stroke="url(#elg)" stroke-width="1.5" stroke-linecap="round"/><path d="M24 5C13.5 9 16.5 21 6 25" stroke="url(#elg)" stroke-width="1.5" stroke-linecap="round"/><path d="M15 13.6C13 9 18 8.4 18.6 6.4" stroke="url(#elg)" stroke-width="1" stroke-linecap="round" opacity=".5"/></svg>

    <nav>
      <button class="nav-item active" data-nav="overview">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        <span>Overview</span>
      </button>
      <div class="nav-section">Commerce</div>
      <button class="nav-item" data-nav="orders">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4zM3 6h18M16 10a4 4 0 0 1-8 0"/></svg>
        <span>Orders</span><span class="badge">0</span>
      </button>
      <button class="nav-item" data-nav="payments">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20M6 15h4"/></svg>
        <span>Payments</span><span class="badge">0</span>
      </button>
      <button class="nav-item" data-nav="customers">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Customers</span>
      </button>
      <div class="nav-section">Catalog</div>
      <button class="nav-item" data-nav="products">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M20 7L12 3 4 7v10l8 4 8-4V7zM4 7l8 4 8-4M12 11v10"/></svg>
        <span>Products</span><span class="badge alert">0</span>
      </button>
      <div class="nav-section">Insights</div>
      <button class="nav-item" data-nav="analytics">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 4-6"/></svg>
        <span>Analytics</span>
      </button>
      <div class="nav-section">Marketing</div>
      <button class="nav-item" data-nav="discounts">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M9 9h.01M15 15h.01M16 8l-8 8M3 7l1-3h16l1 3v3a3 3 0 0 1-3 3 3 3 0 0 1-6 0 3 3 0 0 1-6 0z" /></svg>
        <span>Discounts</span>
      </button>
      <button class="nav-item" data-nav="affiliates">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
        <span>Affiliates</span><span class="badge alert">0</span>
      </button>
    </nav>

    <div class="side-foot">
      <div class="side-user">
        <span class="side-avatar">LB</span>
        <div>
          <div class="su-name">Lab Operator</div>
          <div class="su-role">Owner · admin</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ===================== MAIN ===================== -->
  <div class="main">
    <header class="topbar">
      <div>
        <h1 id="pageTitle">Overview</h1>
        <div class="crumb" id="pageCrumb">Dashboard / Overview</div>
      </div>
      <div class="topbar-spacer"></div>
      <div class="range-tabs" id="rangeTabs">
        <button data-range="7">7D</button>
        <button data-range="30" class="active">30D</button>
        <button data-range="90">90D</button>
      </div>
      <div class="tb-search">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="globalSearch" placeholder="Search orders, customers…" />
      </div>
      <button class="tb-btn" id="notifBtn" aria-label="Notifications">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/></svg>
        <span class="dot"></span>
      </button>
    </header>

    <section class="view" id="view-overview"></section>
    <section class="view" id="view-orders" hidden></section>
    <section class="view" id="view-payments" hidden></section>
    <section class="view" id="view-products" hidden></section>
    <section class="view" id="view-customers" hidden></section>
    <section class="view" id="view-analytics" hidden></section>
    <section class="view" id="view-discounts" hidden></section>
    <section class="view" id="view-affiliates" hidden></section>
  </div>
</div>

<!-- ===================== ORDER DRAWER ===================== -->
<div class="drawer-back" id="drawerBack"></div>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="Order detail">
  <div class="drawer-head">
    <div>
      <h2 id="drawerTitle">Order</h2>
      <div class="dh-sub" id="drawerSub"></div>
    </div>
    <button class="drawer-x" id="drawerClose" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</aside>

<div class="toast-wrap" id="toastWrap"></div>

<style>#opsGate{position:fixed;inset:0;z-index:9999;background:#0f0d0a;display:flex;align-items:center;justify-content:center;font-family:Jost,sans-serif}#opsGate .og-card{width:min(360px,88vw);background:#16130e;border-radius:14px;box-shadow:0 0 0 1px rgba(231,192,106,.22),0 30px 60px rgba(0,0,0,.5);padding:34px 30px;text-align:center}#opsGate .og-glyph{width:44px;height:44px;margin:0 auto 14px}#opsGate h1{font-family:Fraunces,serif;font-weight:500;font-size:21px;color:#f4efe6;margin:0 0 4px}#opsGate p{color:#9c937f;font-size:13.5px;margin:0 0 20px;line-height:1.5}#opsGate input{width:100%;box-sizing:border-box;background:#0f0d0a;border:1px solid rgba(231,192,106,.25);border-radius:9px;padding:11px 13px;color:#f4efe6;font:500 14px 'IBM Plex Mono',monospace;letter-spacing:.04em;outline:none;text-align:center}#opsGate input:focus{border-color:#e7c06a}#opsGate button{width:100%;margin-top:12px;background:#e7c06a;color:#241c0d;border:0;border-radius:9px;padding:11px;font:600 14px Jost,sans-serif;letter-spacing:.02em;cursor:pointer}#opsGate button:hover{background:#f0d08a}#opsGate .og-err{color:#e88c6a;font-size:12.5px;min-height:16px;margin:10px 0 0}#opsGate .og-note{color:#6e6656;font-size:11.5px;margin:18px 0 0;line-height:1.5}#opsGate .shake{animation:ogshake .3s}@keyframes ogshake{25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}</style>
<script>
(function(){
  var KEY="elyria_ops_unlocked";
  var HASH="26f5aa9cf5e3094bbb82e370e2948ff374fb58c9def67e6a76dabbf9a3541bfb";
  var SCRIPTS=["backend-config.js","supabase-client.js","admin-data.js","admin-charts.js","admin.js","search.js"];
  var CB="?v=20260721d";
  function boot(){var i=0;(function next(){if(i>=SCRIPTS.length)return;var s=document.createElement("script");s.src=SCRIPTS[i++]+CB;s.onload=next;document.body.appendChild(s);})();}
  var ok=false; try{ ok=sessionStorage.getItem(KEY)==="1"; }catch(e){}
  if(ok){ boot(); return; }
  var shell=document.querySelector(".shell"); if(shell) shell.style.display="none";
  var ov=document.createElement("div"); ov.id="opsGate";
  ov.innerHTML='<div class="og-card"><svg class="og-glyph" viewBox="0 0 30 30" fill="none"><defs><linearGradient id="oglg" x1="4" y1="4" x2="26" y2="26" gradientUnits="userSpaceOnUse"><stop stop-color="#fdeec0"></stop><stop offset=".5" stop-color="#e7c06a"></stop><stop offset="1" stop-color="#a9792f"></stop></linearGradient></defs><path d="M6 5C16.5 9 13.5 21 24 25" stroke="url(#oglg)" stroke-width="1.5" stroke-linecap="round"></path><path d="M24 5C13.5 9 16.5 21 6 25" stroke="url(#oglg)" stroke-width="1.5" stroke-linecap="round"></path></svg><h1>Operations console</h1><p>Restricted area. Enter the ops passcode to continue.</p><input id="ogPass" type="password" autocomplete="off" placeholder="Passcode" aria-label="Passcode"><button id="ogGo" type="button">Unlock</button><div class="og-err" id="ogErr"></div><p class="og-note">Per-session unlock. This gate is a client-side stopgap \u2014 production access must also be enforced at the edge (Basic Auth or access proxy).</p></div>';
  document.body.appendChild(ov);
  var inp=ov.querySelector("#ogPass"), err=ov.querySelector("#ogErr"), card=ov.querySelector(".og-card");
  function unlock(){ try{ sessionStorage.setItem(KEY,"1"); }catch(e){} ov.remove(); if(shell) shell.style.display=""; boot(); }
  function attempt(){
    var v=inp.value;
    if(!v) return;
    if(!(window.crypto&&crypto.subtle)){ err.textContent="Secure context required (open over https)."; return; }
    crypto.subtle.digest("SHA-256", new TextEncoder().encode(v)).then(function(buf){
      var h=Array.prototype.map.call(new Uint8Array(buf),function(b){return b.toString(16).padStart(2,"0");}).join("");
      if(h===HASH) unlock();
      else{ err.textContent="Incorrect passcode."; inp.value=""; card.classList.remove("shake"); void card.offsetWidth; card.classList.add("shake"); }
    });
  }
  ov.querySelector("#ogGo").addEventListener("click", attempt);
  inp.addEventListener("keydown", function(e){ if(e.key==="Enter") attempt(); });
  setTimeout(function(){ inp.focus(); },50);
})();
</script>
</body>
</html>
